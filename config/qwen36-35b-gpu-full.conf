# Qwen 3.6 35B A3B — experimental full-Metal profile for a 16 GiB M5.
# Keeps the 64K Q4 KV cache on the host to preserve Metal working-set headroom.

MODEL_KEY="qwen36-35b-gpu-full"
MODEL_LABEL="Qwen 3.6 35B A3B (IQ2_M, full GPU experiment)"

MODEL_PATH="${MODEL_PATH:-$MODELS_DIR/Qwen3.6-35B-A3B-MTP-GGUF/Qwen3.6-35B-A3B-UD-IQ2_M.gguf}"
MMPROJ_PATH="${MMPROJ_PATH:-$MODELS_DIR/Qwen3.6-35B-A3B-MTP-GGUF/mmproj-BF16.gguf}"
# The 861 MiB projector does not fit inside this profile's Metal margin.
ENABLE_MMPROJ="${ENABLE_MMPROJ:-0}"
IMAGE_MIN_TOKENS="${IMAGE_MIN_TOKENS:-1024}"
ALIAS="${ALIAS:-Qwen3.6-35B-A3B-IQ2_M-GPU-FULL}"
PORT_DEFAULT="${PORT_DEFAULT:-8081}"

CTX_SIZE="${CTX_SIZE:-65536}"
THREADS="${THREADS:-$(sysctl -n hw.perflevel0.physicalcpu 2>/dev/null || echo 4)}"
THREADS_BATCH="${THREADS_BATCH:-$((THREADS * 2))}"
BATCH_SIZE="${BATCH_SIZE:-2048}"
# Full offload is estimated at 11,054 MiB of Metal memory with ubatch 64.
UBATCH_SIZE="${UBATCH_SIZE:-64}"
N_GPU_LAYERS="${N_GPU_LAYERS:-all}"
CACHE_TYPE_K="${CACHE_TYPE_K:-q4_0}"
CACHE_TYPE_V="${CACHE_TYPE_V:-q4_0}"
FLASH_ATTN="${FLASH_ATTN:-on}"
# Moving the 422 MiB 64K KV allocation to host memory leaves about 1 GiB of
# headroom under this Mac's 12,124 MiB Metal working-set limit.
KV_OFFLOAD="${KV_OFFLOAD:-0}"
OP_OFFLOAD="${OP_OFFLOAD:-1}"
PARALLEL="${PARALLEL:-1}"
CACHE_RAM="${CACHE_RAM:-0}"
CACHE_REUSE="${CACHE_REUSE:-0}"
CTX_CHECKPOINTS="${CTX_CHECKPOINTS:-0}"
CHECKPOINT_MIN_STEP="${CHECKPOINT_MIN_STEP:-16384}"

SPEC_MODE="${SPEC_MODE:-none}"
DRAFT_N_MAX="${DRAFT_N_MAX:-2}"
DRAFT_N_MIN="${DRAFT_N_MIN:-1}"
DRAFT_CACHE_TYPE_K="${DRAFT_CACHE_TYPE_K:-q4_0}"
DRAFT_CACHE_TYPE_V="${DRAFT_CACHE_TYPE_V:-q4_0}"

# Refuse to start the experiment when macOS is already under pressure.
MEMORY_GUARD="${MEMORY_GUARD:-1}"
MIN_FREE_PCT="${MIN_FREE_PCT:-30}"
HEALTH_TIMEOUT="${HEALTH_TIMEOUT:-300}"

pre_launch() {
  if [[ "$MEMORY_GUARD" == 1 ]] && command -v memory_pressure >/dev/null 2>&1; then
    local free_pct
    free_pct="$(memory_pressure | awk '/System-wide memory free percentage/ { gsub(/%/, "", $5); print $5 }')"
    if [[ "$free_pct" =~ ^[0-9]+$ ]] && (( free_pct < MIN_FREE_PCT )); then
      echo "Memory guard: only ${free_pct}% free (< ${MIN_FREE_PCT}%). Refusing GPU-full startup." >&2
      echo "Close applications before retrying; do not disable the guard for this profile." >&2
      exit 1
    fi
  fi
}

build_extra_args() {
  printf '%s\n' \
    --jinja --cont-batching \
    --reasoning auto --reasoning-format deepseek \
    --cache-prompt --cache-idle-slots \
    --cache-reuse "$CACHE_REUSE" \
    --ctx-checkpoints "$CTX_CHECKPOINTS" --checkpoint-min-step "$CHECKPOINT_MIN_STEP" \
    --no-warmup --metrics \
    --fit off \
    --verbosity 3
}

build_spec_args() {
  case "$SPEC_MODE" in
    none) ;;
    mtp)
      printf '%s\n' \
        --spec-type draft-mtp \
        --spec-draft-n-max "$DRAFT_N_MAX" --spec-draft-n-min "$DRAFT_N_MIN" \
        --cache-type-k-draft "$DRAFT_CACHE_TYPE_K" \
        --cache-type-v-draft "$DRAFT_CACHE_TYPE_V"
      ;;
    *)
      echo "Qwen 3.6 GPU-full: SPEC_MODE must be none | mtp (got '$SPEC_MODE')." >&2
      exit 2
      ;;
  esac
}
