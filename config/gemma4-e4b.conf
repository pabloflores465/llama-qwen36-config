# Gemma 4 E4B QAT — local llama-server config (multimodal, + Q8 MTP assistant).
# Sourced by server/start.sh. Override any VAR before sourcing, or edit here.

MODEL_KEY="gemma4-e4b"
MODEL_LABEL="Gemma 4 E4B QAT (+ Q8 MTP, multimodal)"

MODEL_PATH="${MODEL_PATH:-$MODELS_DIR/gemma-4-e4b-qat-GGUF/gemma-4-E4B-it-QAT-Q4_0.gguf}"
MMPROJ_PATH="${MMPROJ_PATH:-$MODELS_DIR/gemma-4-e4b-qat-GGUF/mmproj-gemma-4-E4B-it-QAT-BF16.gguf}"
MTP_PATH="${MTP_PATH:-$MODELS_DIR/gemma-4-e4b-qat-GGUF/mtp-gemma-4-E4B-it.gguf}"
ENABLE_MMPROJ="${ENABLE_MMPROJ:-1}"
ALIAS="${ALIAS:-gemma-4-e4b-qat}"
PORT_DEFAULT="${PORT_DEFAULT:-8081}"

CTX_SIZE="${CTX_SIZE:-122880}"
THREADS="${THREADS:-4}"
THREADS_BATCH="${THREADS_BATCH:-4}"
BATCH_SIZE="${BATCH_SIZE:-2048}"
UBATCH_SIZE="${UBATCH_SIZE:-512}"
N_GPU_LAYERS="${N_GPU_LAYERS:--1}"
CACHE_TYPE_K="${CACHE_TYPE_K:-q4_1}"
CACHE_TYPE_V="${CACHE_TYPE_V:-q4_1}"
FLASH_ATTN="${FLASH_ATTN:-on}"
KV_OFFLOAD="${KV_OFFLOAD:-1}"
OP_OFFLOAD="${OP_OFFLOAD:-1}"
PARALLEL="${PARALLEL:-1}"
CACHE_RAM="${CACHE_RAM:-512}"
CACHE_REUSE="${CACHE_REUSE:-0}"
CTX_CHECKPOINTS="${CTX_CHECKPOINTS:-8}"
CHECKPOINT_MIN_STEP="${CHECKPOINT_MIN_STEP:-16384}"
SLOT_SAVE_PATH="${SLOT_SAVE_PATH:-$HOME/.cache/llama.cpp/gemma4-e4b/slots}"

# Speculative decoding: none | mtp | ngram
SPEC_MODE="${SPEC_MODE:-mtp}"
DRAFT_N_MAX="${DRAFT_N_MAX:-1}"
DRAFT_N_MIN="${DRAFT_N_MIN:-1}"
NGRAM_N_MIN="${NGRAM_N_MIN:-1}"
NGRAM_N_MAX="${NGRAM_N_MAX:-4}"
NGRAM_N_MATCH="${NGRAM_N_MATCH:-24}"

pre_launch() { :; }

build_extra_args() {
  printf '%s\n' \
    --jinja --cont-batching --cache-prompt --cache-idle-slots \
    --slots --slot-save-path "$SLOT_SAVE_PATH" \
    --metrics --no-warmup --cache-reuse "$CACHE_REUSE" \
    --fit off --verbosity 3
}

build_spec_args() {
  case "$SPEC_MODE" in
    none) ;;
    mtp)
      [[ -f "$MTP_PATH" ]] || { echo "MTP assistant not found: $MTP_PATH" >&2; exit 1; }
      printf '%s\n' \
        --spec-type draft-mtp --spec-draft-model "$MTP_PATH" \
        --spec-draft-ngl -1 \
        --spec-draft-n-max "$DRAFT_N_MAX" --spec-draft-n-min "$DRAFT_N_MIN" \
        --spec-draft-type-k q8_0 --spec-draft-type-v q8_0
      ;;
    ngram)
      printf '%s\n' \
        --spec-type ngram-mod \
        --spec-ngram-mod-n-min "$NGRAM_N_MIN" \
        --spec-ngram-mod-n-max "$NGRAM_N_MAX" \
        --spec-ngram-mod-n-match "$NGRAM_N_MATCH"
      ;;
    *)
      echo "Gemma 4: SPEC_MODE must be none | mtp | ngram (got '$SPEC_MODE')" >&2
      exit 2
      ;;
  esac
}
