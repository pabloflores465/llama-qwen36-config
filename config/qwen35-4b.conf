# Qwen 3.5 4B MTP — local llama-server config (multimodal, built-in MTP head).
# Sourced by server/start.sh. Override any VAR before sourcing, or edit here.

MODEL_KEY="qwen35-4b"
MODEL_LABEL="Qwen 3.5 4B MTP (Q4_K_XL, multimodal)"

MODEL_PATH="${MODEL_PATH:-$MODELS_DIR/Qwen3.5-4B-MTP-GGUF/Qwen3.5-4B-UD-Q4_K_XL.gguf}"
MMPROJ_PATH="${MMPROJ_PATH:-$MODELS_DIR/Qwen3.5-4B-MTP-GGUF/mmproj-BF16.gguf}"
ENABLE_MMPROJ="${ENABLE_MMPROJ:-1}"
IMAGE_MIN_TOKENS="${IMAGE_MIN_TOKENS:-1024}"
ALIAS="${ALIAS:-Qwen3.5-4B-MTP-Q4_K_XL}"
PORT_DEFAULT="${PORT_DEFAULT:-8081}"

CTX_SIZE="${CTX_SIZE:-122880}"
THREADS="${THREADS:-8}"
THREADS_BATCH="${THREADS_BATCH:-10}"
BATCH_SIZE="${BATCH_SIZE:-2048}"
UBATCH_SIZE="${UBATCH_SIZE:-512}"
N_GPU_LAYERS="${N_GPU_LAYERS:--1}"
CACHE_TYPE_K="${CACHE_TYPE_K:-q4_0}"
CACHE_TYPE_V="${CACHE_TYPE_V:-q4_0}"
FLASH_ATTN="${FLASH_ATTN:-on}"
KV_OFFLOAD="${KV_OFFLOAD:-1}"
OP_OFFLOAD="${OP_OFFLOAD:-1}"
PARALLEL="${PARALLEL:-1}"
CACHE_RAM="${CACHE_RAM:-512}"
CACHE_REUSE="${CACHE_REUSE:-0}"
CTX_CHECKPOINTS="${CTX_CHECKPOINTS:-8}"
CHECKPOINT_MIN_STEP="${CHECKPOINT_MIN_STEP:-16384}"
LOOKUP_CACHE="${LOOKUP_CACHE:-$HOME/.cache/llama.cpp/qwen35-4b/ngram-cache.bin}"

# Speculative decoding: none | mtp | ngram | mtp-ngram
SPEC_MODE="${SPEC_MODE:-mtp}"
DRAFT_N_MAX="${DRAFT_N_MAX:-3}"
DRAFT_N_MIN="${DRAFT_N_MIN:-1}"
NGRAM_N_MIN="${NGRAM_N_MIN:-1}"
NGRAM_N_MAX="${NGRAM_N_MAX:-4}"
NGRAM_N_MATCH="${NGRAM_N_MATCH:-24}"

# Build a valid n-gram cache the first time we run n-gram spec.
pre_launch() {
  if [[ "$SPEC_MODE" == ngram || "$SPEC_MODE" == mtp-ngram ]] && [[ ! -f "$LOOKUP_CACHE" ]]; then
    echo "Initializing n-gram cache: $LOOKUP_CACHE"
    llama-lookup-create --model "$MODEL_PATH" --n-gpu-layers 0 --ctx-size 128 \
      --predict 1 --prompt "initialize persistent ngram cache" \
      --lookup-cache-static "$LOOKUP_CACHE" >/dev/null
  fi
}

build_extra_args() {
  printf '%s\n' \
    --jinja --cont-batching \
    --reasoning auto --reasoning-format deepseek \
    --cache-prompt --cache-idle-slots \
    --cache-reuse "$CACHE_REUSE" \
    --ctx-checkpoints "$CTX_CHECKPOINTS" --checkpoint-min-step "$CHECKPOINT_MIN_STEP" \
    --no-warmup --metrics --fit off --verbosity 3
}

build_spec_args() {
  case "$SPEC_MODE" in
    none) ;;
    mtp)
      printf '%s\n' \
        --spec-type draft-mtp \
        --spec-draft-n-max "$DRAFT_N_MAX" --spec-draft-n-min "$DRAFT_N_MIN" \
        --spec-draft-type-k q4_0 --spec-draft-type-v q4_0
      ;;
    ngram)
      printf '%s\n' \
        --spec-type ngram-cache --lookup-cache-dynamic "$LOOKUP_CACHE" \
        --spec-ngram-mod-n-min "$NGRAM_N_MIN" \
        --spec-ngram-mod-n-max "$NGRAM_N_MAX" \
        --spec-ngram-mod-n-match "$NGRAM_N_MATCH"
      ;;
    mtp-ngram)
      printf '%s\n' \
        --spec-type draft-mtp,ngram-cache --lookup-cache-dynamic "$LOOKUP_CACHE" \
        --spec-draft-n-max "$DRAFT_N_MAX" --spec-draft-n-min "$DRAFT_N_MIN" \
        --spec-draft-type-k q4_0 --spec-draft-type-v q4_0 \
        --spec-ngram-mod-n-min "$NGRAM_N_MIN" \
        --spec-ngram-mod-n-max "$NGRAM_N_MAX" \
        --spec-ngram-mod-n-match "$NGRAM_N_MATCH"
      ;;
    *)
      echo "Qwen 3.5: SPEC_MODE must be none | mtp | ngram | mtp-ngram (got '$SPEC_MODE')" >&2
      exit 2
      ;;
  esac
}
